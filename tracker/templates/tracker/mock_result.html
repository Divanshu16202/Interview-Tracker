{% extends 'tracker/base.html' %}
{% block content %}

<div class="container mt-5 text-center">
    <div class="card shadow-lg p-5">
        <h2>Mock Interview Result</h2>
        <h3 class="mt-3">Score: {{ score }} / {{ total }}</h3>

        {% if score >= total|divisibleby:2 %}
            <p class="text-success mt-3">Excellent Performance! 🚀</p>
        {% else %}
            <p class="text-warning mt-3">Keep Practicing! 💪</p>
        {% endif %}

        <a href="{% url 'home' %}" class="btn btn-primary mt-3">
            Retake Interview
        </a>
    </div>
</div>

{% endblock %}
