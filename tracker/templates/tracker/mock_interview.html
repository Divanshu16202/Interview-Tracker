{% extends 'tracker/base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-lg p-4">
        <h3 class="mb-4 text-center">Computer Science Mock Interview</h3>

        <form method="POST">
            {% csrf_token %}

            {% for question in questions %}
            <div class="mb-4">
                <h5>Q{{ forloop.counter }}. {{ question.question }}</h5>

                <div class="form-check">
                    <input class="form-check-input" type="radio"
                        name="{{ question.id }}"
                        value="{{ question.option1 }}">
                    <label class="form-check-label">{{ question.option1 }}</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio"
                        name="{{ question.id }}"
                        value="{{ question.option2 }}">
                    <label class="form-check-label">{{ question.option2 }}</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio"
                        name="{{ question.id }}"
                        value="{{ question.option3 }}">
                    <label class="form-check-label">{{ question.option3 }}</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio"
                        name="{{ question.id }}"
                        value="{{ question.option4 }}">
                    <label class="form-check-label">{{ question.option4 }}</label>
                </div>
            </div>
            {% endfor %}

            <div class="text-center">
                <button type="submit" class="btn btn-success px-5">
                    Finish Interview
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
