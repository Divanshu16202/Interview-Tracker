        },
        {
            q: "Explain IPv4 vs IPv6.",

        },
        {
            q: "What is DNS? How does it work?",
            a: "DNS (Domain Name System) converts domain names to IP addresses.<br><br><strong>DNS Hierarchy:</strong><br>• Root DNS Servers (.)<br>• TLD Servers (.com, .org, .net)<br>• Authoritative DNS Servers<br><br><strong>DNS Record Types:</strong><br>• A: IPv4 address<br>• AAAA: IPv6 address<br>• CNAME: Canonical name (alias)<br>• MX: Mail exchange<br>• TXT: Text information<br>• NS: Name server<br><br><strong>Query Process:</strong><br>1. Browser checks local cache<br>2. Checks hosts file<br>3. Queries recursive DNS resolver<br>4. Resolver queries root server<br>5. Root points to TLD server<br>6. TLD points to authoritative server<br>7. Authoritative returns IP<br>8. Response cached<br><br><strong>Example:</strong><br>www.google.com → 142.250.185.46"
        },
        {
            q: "Explain HTTP and HTTPS.",

        },
        {
            q: "What is FTP?",
            a: "FTP (File Transfer Protocol) transfers files between client and server.<br><br><strong>Characteristics:</strong><br>• Port 21 (control), Port 20 (data)<br>• Two connections: Control + Data<br>• Authentication required<br><br><strong>Modes:</strong><br>1. <strong>Active Mode:</strong><br>   • Client opens random port<br>   • Server connects from port 20 to client<br>   • May face firewall issues<br><br>2. <strong>Passive Mode:</strong><br>   • Client opens two random ports<br>   • Server opens random port for data<br>   • Better for firewalls<br><br><strong>FTP Commands:</strong><br>• USER, PASS: Authentication<br>• LIST: List files<br>• RETR: Download file<br>• STOR: Upload file<br>• DELE: Delete file<br>• MKD: Make directory<br><br><strong>Secure Alternatives:</strong><br>• SFTP (SSH File Transfer)<br>• FTPS (FTP over SSL)"
        },
        {
            q: "Explain SMTP, POP3, and IMAP.",

        },
        {
            q: "What is MAC Address?",
            a: "MAC (Media Access Control) address is physical address of network interface.<br><br><strong>Characteristics:</strong><br>• 48-bit (6 bytes)<br>• Hexadecimal format (00:1A:2B:3C:4D:5E)<br>• Unique per device (theoretically)<br>• Assigned by manufacturer<br>• Layer 2 (Data Link Layer)<br><br><strong>Structure:</strong><br>• First 24 bits: OUI (Organizationally Unique Identifier)<br>• Last 24 bits: NIC-specific<br><br><strong>Types:</strong><br>• Unicast: First byte LSB=0<br>• Multicast: First byte LSB=1<br>• Broadcast: FF:FF:FF:FF:FF:FF<br><br><strong>vs IP Address:</strong><br>• MAC: Physical, Layer 2, permanent<br>• IP: Logical, Layer 3, can change<br><br><strong>ARP (Address Resolution Protocol):</strong><br>Maps IP address to MAC address"
        },
        {
            q: "Explain ARP and RARP.",
            a: "ARP and RARP resolve between IP and MAC addresses.<br><br><strong>ARP (Address Resolution Protocol):</strong><br>• Maps IP address → MAC address<br>• Broadcast request: 'Who has IP x.x.x.x?'<br>• Target responds with MAC<br>• ARP cache stores mappings<br>• Gratuitous ARP: Announce own IP-MAC<br><br><strong>ARP Packet:</strong><br>• Hardware type<br>• Protocol type<br>• Sender MAC/IP<br>• Target MAC/IP<br><br><strong>RARP (Reverse ARP):</strong><br>• Maps MAC address → IP address<br>• Used by diskless workstations<br>• Obsolete (replaced by BOOTP/DHCP)<br><br><strong>ARP Spoofing (Attack):</strong><br>• Send fake ARP replies<br>• Attacker becomes man-in-the-middle<br>• Prevent with static ARP entries"
        },
        {
            q: "What is DHCP?",

        },
        {
            q: "Explain NAT (Network Address Translation).",
            a: "NAT maps private IPs to public IP for internet access.<br><br><strong>Types:</strong><br><br>1. <strong>Static NAT:</strong><br>   • One-to-one mapping<br>   • Each private IP maps to specific public IP<br><br>2. <strong>Dynamic NAT:</strong><br>   • Pool of public IPs<br>   • Mapped dynamically<br><br>3. <strong>PAT (Port Address Translation)/NAPT:</strong><br>   • Many-to-one mapping<br>   • Uses port numbers to differentiate<br>   • Most common (home routers)<br><br><strong>How PAT Works:</strong><br>Private: 192.168.1.10:1234 → Public: 203.0.113.5:5678<br>Private: 192.168.1.11:1234 → Public: 203.0.113.5:5679<br><br><strong>Advantages:</strong><br>• Conserves public IPs<br>• Security (hides internal network)<br>• Flexibility<br><br><strong>Disadvantages:</strong><br>• Breaks end-to-end connectivity<br>• Issues with some protocols (FTP, VoIP)"
        },
        {
            q: "What is a Firewall?",
            a: "Firewall monitors and controls network traffic based on rules.<br><br><strong>Types:</strong><br><br>1. <strong>Packet Filtering Firewall:</strong><br>   • Inspects packets individually<br>   • Based on IP, port, protocol<br>   • Stateless<br><br>2. <strong>Stateful Inspection Firewall:</strong><br>   • Tracks connection state<br>   • More secure than packet filtering<br><br>3. <strong>Application Gateway (Proxy):</strong><br>   • Inspects application data<br>   • Acts as intermediary<br><br>4. <strong>Next-Generation Firewall (NGFW):</strong><br>   • Deep packet inspection<br>   • Intrusion prevention<br>   • Application awareness<br><br><strong>Rules:</strong><br>• Allow/Deny based on:<br>  • Source/Destination IP<br>  • Source/Destination Port<br>  • Protocol<br>  • Direction<br><br><strong>Example Rule:</strong><br>Allow TCP from 192.168.1.0/24 to any port 80"
        },
        {
            q: "Explain VPN (Virtual Private Network).",
            a: "VPN creates encrypted tunnel over public network for secure communication.<br><br><strong>Types:</strong><br><br>1. <strong>Remote Access VPN:</strong><br>   • Individual connects to corporate network<br>   • Client software required<br><br>2. <strong>Site-to-Site VPN:</strong><br>   • Connects entire networks<br>   • Router-to-router<br><br><strong>VPN Protocols:</strong><br>• <strong>PPTP:</strong> Old, insecure<br>• <strong>L2TP/IPsec:</strong> Layer 2 + IPsec<br>• <strong>IPsec:</strong> Secure, common<br>• <strong>OpenVPN:</strong> Open source, flexible<br>• <strong>WireGuard:</strong> Modern, fast<br><br><strong>Benefits:</strong><br>• Encryption<br>• Authentication<br>• Anonymity<br>• Access geo-restricted content<br>• Secure remote work<br><br><strong>Tunneling:</strong><br>Original packet encrypted and encapsulated in new packet"
        },
        {
            q: "What is OSI Model's Physical Layer?",
            a: "Physical layer deals with bit transmission over physical medium.<br><br><strong>Functions:</strong><br>• Bit representation (encoding)<br>• Data rate control<br>• Synchronization<br>• Line configuration (point-to-point/multipoint)<br>• Physical topology<br>• Transmission mode (simplex, half-duplex, full-duplex)<br><br><strong>Hardware:</strong><br>• Hubs<br>• Repeaters<br>• Modems<br>• Cables (UTP, coaxial, fiber)<br>• Connectors (RJ45)<br><br><strong>Signals:</strong><br>• Analog: Continuous waves<br>• Digital: Discrete pulses<br><br><strong>Transmission Media:</strong><br>• Guided: Twisted pair, coaxial, fiber optic<br>• Unguided: Radio waves, microwave, infrared"
        },
        {
            q: "Explain Data Link Layer functions.",
            a: "Data Link layer provides node-to-node reliable data transfer.<br><br><strong>Functions:</strong><br><br>1. <strong>Framing:</strong><br>   • Divides bit stream into frames<br>   • Adds header and trailer<br><br>2. <strong>Physical Addressing:</strong><br>   • MAC addresses in header<br><br>3. <strong>Error Control:</strong><br>   • Error detection (CRC, checksum)<br>   • Error correction (ARQ)<br><br>4. <strong>Flow Control:</strong><br>   • Prevents sender overwhelming receiver<br>   • Stop-and-Wait, Sliding Window<br><br>5. <strong>Access Control:</strong><br>   • Controls which device transmits<br>   • CSMA/CD, CSMA/CA<br><br><strong>Sub-layers:</strong><br>• LLC (Logical Link Control): Error/flow control<br>• MAC (Media Access Control): Addressing, channel access<br><br><strong>Protocols:</strong><br>• Ethernet (IEEE 802.3)<br>• WiFi (IEEE 802.11)<br>• PPP (Point-to-Point Protocol)"
        },
        {
            q: "What is CSMA/CD?",
            a: "CSMA/CD (Carrier Sense Multiple Access with Collision Detection) used in Ethernet.<br><br><strong>Process:</strong><br><br>1. <strong>Carrier Sense:</strong><br>   • Listen before transmitting<br>   • If channel idle → transmit<br>   • If busy → wait<br><br>2. <strong>Collision Detection:</strong><br>   • Monitor while transmitting<br>   • If collision detected:<br>     • Stop transmission<br>     • Send jam signal<br>     • Wait random time (backoff)<br>     • Retry<br><br><strong>Binary Exponential Backoff:</strong><br>• After nth collision, wait random time from 0 to 2ⁿ-1<br>• Increases with collisions<br><br><strong>Ethernet Frame:</strong><br>• Preamble (7 bytes)<br>• SFD (1 byte)<br>• Dest MAC (6)<br>• Src MAC (6)<br>• Length/Type (2)<br>• Data (46-1500)<br>• CRC (4)<br><br><strong>CSMA/CA (Collision Avoidance):</strong><br>Used in WiFi (wireless)"
        },
        {
            q: "Explain Network Layer protocols.",
            a: "Network layer handles routing and logical addressing.<br><br><strong>IP (Internet Protocol):</strong><br>• IPv4, IPv6<br>• Connectionless<br>• Best-effort delivery<br><br><strong>ICMP (Internet Control Message Protocol):</strong><br>• Error reporting<br>• Ping, Traceroute<br>• Destination unreachable<br>• Time exceeded<br><br><strong>ARP (Address Resolution Protocol):</strong><br>• IP to MAC mapping<br><br><strong>RARP:</strong><br>• MAC to IP (obsolete)<br><br><strong>Routing Protocols:</strong><br><br>1. <strong>RIP (Routing Information Protocol):</strong><br>   • Distance vector<br>   • Hop count metric<br>   • Max 15 hops<br><br>2. <strong>OSPF (Open Shortest Path First):</strong><br>   • Link state<br>   • Dijkstra algorithm<br>   • Fast convergence<br><br>3. <strong>BGP (Border Gateway Protocol):</strong><br>   • Path vector<br>   • Inter-domain routing<br>   • Used on internet"
        },
        {
            q: "What is Routing? Explain types.",
            a: "Routing determines path for packets to reach destination.<br><br><strong>Routing Algorithms:</strong><br><br>1. <strong>Distance Vector:</strong><br>   • Share routing table with neighbors<br>   • Bellman-Ford algorithm<br>   • Example: RIP<br>   • Count-to-infinity problem<br><br>2. <strong>Link State:</strong><br>   • Share link information with all routers<br>   • Dijkstra's algorithm<br>   • Example: OSPF<br>   • Faster convergence<br><br><strong>Routing Types:</strong><br><br>1. <strong>Static Routing:</strong><br>   • Manual configuration<br>   • No adaptation to changes<br><br>2. <strong>Dynamic Routing:</strong><br>   • Automatic updates<br>   • Adapts to network changes<br><br><strong>Routing Tables:</strong><br>• Destination network<br>• Next hop<br>• Metric<br>• Interface"
        },
        {
            q: "Explain TCP 3-Way Handshake.",
            a: "TCP 3-way handshake establishes reliable connection.<br><br><strong>Process:</strong><br><br>1. <strong>SYN (Client → Server):</strong><br>   • Client sends SYN packet<br>   • Sequence number = x<br>   • SYN flag = 1<br><br>2. <strong>SYN-ACK (Server → Client):</strong><br>   • Server responds with SYN-ACK<br>   • Acknowledgment number = x+1<br>   • Server's sequence number = y<br>   • SYN=1, ACK=1<br><br>3. <strong>ACK (Client → Server):</strong><br>   • Client sends ACK<br>   • Acknowledgment number = y+1<br>   • Sequence number = x+1<br>   • ACK=1<br><br><strong>Connection Established:</strong><br>Both sides can send data<br><br><strong>TCP Flags:</strong><br>• SYN: Synchronize<br>• ACK: Acknowledgment<br>• FIN: Finish<br>• RST: Reset<br>• PSH: Push<br>• URG: Urgent<br><br><strong>Connection Termination:</strong><br>4-way handshake (FIN, ACK, FIN, ACK)"
        },
        {
            q: "What is Congestion Control?",
            a: "Congestion control prevents network overload.<br><br><strong>TCP Congestion Control Algorithms:</strong><br><br>1. <strong>Slow Start:</strong><br>   • Initially congestion window = 1 MSS<br>   • Double each RTT (exponential)<br>   • Until threshold (ssthresh)<br><br>2. <strong>Congestion Avoidance:</strong><br>   • After ssthresh, additive increase<br>   • Increase by 1 MSS per RTT<br><br>3. <strong>Fast Retransmit:</strong><br>   • 3 duplicate ACKs → retransmit<br>   • Don't wait for timeout<br><br>4. <strong>Fast Recovery:</strong><br>   • After fast retransmit<br>   • Set ssthresh = cwnd/2<br>   • cwnd = ssthresh + 3<br>   • Then congestion avoidance<br><br><strong>TCP Variants:</strong><br>• Tahoe<br>• Reno<br>• NewReno<br>• Cubic<br><br><strong>AQM (Active Queue Management):</strong><br>• RED, ECN"
        },
        {
            q: "Explain Flow Control in TCP.",
            a: "Flow control prevents sender from overwhelming receiver.<br><br><strong>Sliding Window Protocol:</strong><br><br>1. <strong>Receiver Window (rwnd):</strong><br>   • Advertised by receiver<br>   • Free buffer space<br>   • Included in TCP header<br><br>2. <strong>Congestion Window (cwnd):</strong><br>   • Sender's estimate of network capacity<br><br>3. <strong>Send Window = min(cwnd, rwnd)</strong><br><br><strong>Mechanism:</strong><br>• Sender can send up to window size before ACK<br>• Receiver ACKs consumed data<br>• Window slides forward<br><br><strong>Stop-and-Wait vs Sliding Window:</strong><br><br>| Feature | Stop-and-Wait | Sliding Window |<br>|---------|---------------|----------------|<br>| Efficiency | Low | High |<br>| Window Size | 1 packet | Multiple packets |<br>| Utilization | Poor | Good |<br><br><strong>Zero Window:</strong><br>• Receiver advertises window=0<br>• Sender stops transmitting<br>• Periodic window probes"
        },
        {
            q: "What are Sockets and Ports?",
            a: "Sockets and ports enable network communication between processes.<br><br><strong>Socket:</strong><br>• Endpoint for communication<br>• IP address + Port number<br>• Types: Stream (TCP), Datagram (UDP)<br><br><strong>Socket Functions:</strong><br>• socket(): Create socket<br>• bind(): Assign address<br>• listen(): Wait for connections (TCP server)<br>• connect(): Connect to server (TCP client)<br>• accept(): Accept connection (TCP server)<br>• send()/recv(): Data transfer<br>• close(): Close socket<br><br><strong>Port Numbers:</strong><br>• 0-1023: Well-known ports<br>  • 20,21: FTP<br>  • 22: SSH<br>  • 23: Telnet<br>  • 25: SMTP<br>  • 53: DNS<br>  • 80: HTTP<br>  • 443: HTTPS<br>• 1024-49151: Registered ports<br>• 49152-65535: Dynamic/private<br><br><strong>Socket Pair:</strong><br>(Client IP, Client Port, Server IP, Server Port)"
        },
        {
            q: "Explain Wireshark and its uses.",
            a: "Wireshark is network protocol analyzer for packet capture and inspection.<br><br><strong>Features:</strong><br>• Live capture<br>• Offline analysis<br>• Deep packet inspection<br>• Filtering (display and capture)<br>• Color coding<br>• Statistics and graphs<br>• VoIP analysis<br><br><strong>Capture Filters (BPF):</strong><br>• host 192.168.1.1<br>• port 80<br>• tcp or udp<br>• not arp<br><br><strong>Display Filters:</strong><br>• ip.src == 192.168.1.1<br>• tcp.port == 443<br>• http.request.method == \"GET\"<br>• dns.qry.name contains \"google\"<br><br><strong>Uses:</strong><br>• Network troubleshooting<br>• Security analysis<br>• Protocol development<br>• Learning networking<br>• Debugging applications<br><br><strong>Follow TCP Stream:</strong><br>Reconstructs entire TCP conversation"
        },
        {
            q: "What is QoS (Quality of Service)?",
            a: "QoS manages network resources to ensure performance for critical applications.<br><br><strong>QoS Parameters:</strong><br>• Bandwidth<br>• Delay (latency)<br>• Jitter (delay variation)<br>• Packet loss<br><br><strong>QoS Techniques:</strong><br><br>1. <strong>Classification & Marking:</strong><br>   • Identify traffic types<br>   • DSCP, CoS marking<br><br>2. <strong>Policing & Shaping:</strong><br>   • Policing: Drop excess traffic<br>   • Shaping: Buffer excess traffic<br><br>3. <strong>Queuing:</strong><br>   • FIFO: First In First Out<br>   • PQ (Priority Queuing)<br>   • WFQ (Weighted Fair Queuing)<br>   • CBWFQ (Class-Based WFQ)<br><br>4. <strong>Congestion Avoidance:</strong><br>   • RED (Random Early Detection)<br>   • WRED (Weighted RED)<br><br><strong>DiffServ (Differentiated Services):</strong><br>• Per-hop behavior<br>• EF (Expedited Forwarding): Low loss/latency<br>• AF (Assured Forwarding): Assured delivery<br>• BE (Best Effort): Default"
        },
        {
            q: "Explain Network Topologies.",
            a: "Network topology defines physical/logical arrangement of devices.<br><br><strong>Types:</strong><br><br>1. <strong>Bus Topology:</strong><br>   • Single cable, terminators at ends<br>   • Easy to install<br>   • Single point of failure<br>   • Limited length<br><br>2. <strong>Star Topology:</strong><br>   • Central hub/switch<br>   • Easy to manage<br>   • Hub failure = network down<br>   • Most common (Ethernet)<br><br>3. <strong>Ring Topology:</strong><br>   • Closed loop<br>   • Token passing<br>   • Unidirectional<br>   • Failure affects entire ring<br><br>4. <strong>Mesh Topology:</strong><br>   • Every device connects to others<br>   • Redundant paths<br>   • Expensive<br>   • High reliability<br><br>5. <strong>Tree Topology:</strong><br>   • Hierarchical<br>   • Combination of star<br>   • Scalable<br><br>6. <strong>Hybrid Topology:</strong><br>   • Combination of multiple topologies"
        },
        {
            q: "What is SDN (Software-Defined Networking)?",
            a: "SDN separates control plane from data plane for programmable networks.<br><br><strong>Architecture:</strong><br><br>1. <strong>Infrastructure Layer (Data Plane):</strong><br>   • Switches, routers<br>   • Forward packets<br><br>2. <strong>Control Layer (Control Plane):</strong><br>   • Centralized controller<br>   • Makes forwarding decisions<br><br>3. <strong>Application Layer:</strong><br>   • Network applications<br>   • Load balancing, security<br><br><strong>OpenFlow Protocol:</strong><br>• Communication between controller and switches<br>• Flow table entries<br>• Match + Action<br><br><strong>Benefits:</strong><br>• Centralized management<br>• Programmability<br>• Vendor independence<br>• Faster innovation<br>• Better automation<br><br><strong>Use Cases:</strong><br>• Data centers<br>• WAN optimization<br>• Network virtualization<br>• Traffic engineering"
        }
        
    ]

        <div class="topic-header">
            <h3>
                <i class="fas fa-book-open"></i>
                ${topicName} - 30 Important Questions
            </h3>
        </div>
        <div class="questions-accordion">
    `;

    questions.forEach((item, index) => {
        html += `
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion(${index})">
                    <span class="question-number">${index + 1}</span>
                    <span class="question-title">${item.q}</span>
                    <i class="fas fa-chevron-down accordion-icon"></i>
                </div>
                <div class="accordion-content" id="accordion-${index}">
                    <div class="answer-content">
                        ${item.a}
                    </div>
                </div>
            </div>
        `;
    });

    html += `</div>`;
    container.innerHTML = html;
}

function toggleAccordion(index) {
    const content = document.getElementById(`accordion-${index}`);
    const header = content.previousElementSibling;
    const icon = header.querySelector('.accordion-icon');
    
    if (content.classList.contains('active')) {
        content.classList.remove('active');
        icon.classList.remove('fa-chevron-up');
        icon.classList.add('fa-chevron-down');
    } else {
        content.classList.add('active');
        icon.classList.remove('fa-chevron-down');
        icon.classList.add('fa-chevron-up');
    }
}
</script>
